<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Dashboard</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <div class="container">
    <div class="header">
      <div class="logo">CryptoDash</div>
      <button>Refresh</button>
    </div>

    <h1>Market Overview</h1>

    <div class="card">
      <h3>Bitcoin (BTC)</h3>
      <p class="green">€64,200 (+2.5%)</p>
    </div>

    <div class="card">
      <h3>Ethereum (ETH)</h3>
      <p class="red">€3,200 (-1.2%)</p>
    </div>

    <div class="card">
      <h3>Solana (SOL)</h3>
      <p class="green">€145 (+5.8%)</p>
    </div>

  </div>

</body>
</html>
